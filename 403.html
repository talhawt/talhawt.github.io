<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Erişim Engellendi - Talha Wazolski</title>
  
  <link href="https://i.hizliresim.com/7ynszlx.png" rel="icon">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Raleway:400,700" rel="stylesheet">
  
  <meta http-equiv="refresh" content="10;url=/index.html">

  <style>
    body {
      background: radial-gradient(circle at center, #011429 0%, #000 100%);
      color: #fff;
      font-family: "Raleway", sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .container {
      padding: 50px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
      animation: containerAppear 1s ease-out;
    }

    @keyframes containerAppear {
      0% { transform: translateY(30px) scale(0.9); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    h1 {
      font-size: 120px;
      margin: 0;
      font-weight: 700;
      background: linear-gradient(45deg, #0563bb, #bc0ec4, #0563bb);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 4s linear infinite;
      text-shadow: 0 0 15px rgba(5,99,187,0.3);
    }

    @keyframes glowText {
      0% { background-position: 0% 50%; text-shadow: 0 0 15px rgba(5,99,187,0.3); }
      50% { background-position: 100% 50%; text-shadow: 0 0 30px rgba(188,14,196,0.5); }
      100% { background-position: 0% 50%; text-shadow: 0 0 15px rgba(5,99,187,0.3); }
    }

    h2 { font-size: 28px; margin: 25px 0 15px; color: #fff; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 40px; font-size: 16px; line-height: 1.6; }
    
    .countdown {
      font-weight: 700;
      color: #bc0ec4;
      font-size: 18px;
      animation: pulseCountdown 1s infinite;
    }

    @keyframes pulseCountdown {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(45deg, #0563bb, #067ded);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.4s ease;
      box-shadow: 0 4px 15px rgba(5,99,187,0.3);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: linear-gradient(45deg, #067ded, #0563bb);
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(5,99,187,0.5);
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <div class="container">
    <h1>403</h1>
    <h2>Hop! Giriş Yetkisi Yok Kanka.</h2>
    <p>Girmeye çalıştığın yer bir klasör dizini ve erişime kapalıdır.<br>
       Merak etme, <span class="countdown" id="timer">10</span> saniye içinde ana sayfaya ışınlanıyorsun...</p>
    <a href="/index.html" class="btn">Hemen Güvenli Bölgeye Dön</a>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": ["#0563bb", "#bc0ec4", "#ffffff"] },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5, "random": true },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#0563bb", "opacity": 0.2, "width": 1 },
        "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
        "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }, "push": { "particles_nb": 4 } }
      },
      "retina_detect": true
    });

    var seconds = 10;
    var countdown = document.getElementById('timer');

    setInterval(function() {
      seconds--;
      if (seconds >= 0) {
        countdown.textContent = seconds;
      }
    }, 1000);
  </script>

</body>
</html>
